<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <title>anji.ng | Developer Utilities</title>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); }
        .glow:hover { box-shadow: 0 0 40px rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
    </style>
</head>
<body class="text-zinc-200 selection:bg-zinc-500 selection:text-white" 
      x-data="{ 
        search: '', 
        tools: [
            { name: 'Scrape.dog', desc: 'Automated web scraping scripts for data extraction.', icon: 'M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2 M7 11 12 16 17 11 M12 4v12' },
            { name: 'CSS Injector', desc: 'Live preview and inject custom CSS into any WordPress site.', icon: 'M16 18 22 12 16 6 M8 6 2 12 8 18' },
            { name: '2FA Mini', desc: 'Lightweight Telegram-integrated authenticator.', icon: 'M3 11h18v11H3z M7 11V7a5 5 0 0 1 10 0v4' }
        ],
        get filteredTools() {
            return this.tools.filter(t => t.name.toLowerCase().includes(this.search.toLowerCase()))
        }
      }">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 overflow-hidden">
        <div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-zinc-800/30 blur-[120px] rounded-full"></div>
    </div>

    <nav class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
                <span class="text-black font-bold text-sm">A.</span>
            </div>
            <span class="text-xl font-bold tracking-tight text-white">anji.ng</span>
        </div>
        <div class="flex items-center gap-6 text-sm font-medium text-zinc-400">
            <a href="#tools" class="hover:text-white transition-colors">Tools</a>
            <a href="https://github.com/devanjing" class="bg-zinc-800 px-4 py-2 rounded-full border border-zinc-700 text-white hover:bg-zinc-700 transition-all">GitHub</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-20 pb-32 text-center">
        <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tight mb-6">
            Web tools with <br><span class="text-zinc-500 italic">zero bark</span>, all bite.
        </h1>
        
        <div class="max-w-2xl mx-auto glass rounded-2xl p-2 mb-16 shadow-2xl border border-zinc-800">
            <div class="flex items-center bg-zinc-900/50 rounded-xl px-4 py-3 border border-zinc-700/50 focus-within:border-zinc-500 transition-all">
                <span class="text-zinc-500 mono mr-3">$</span>
                <input type="text" x-model="search" placeholder="Search tools..." 
                       class="bg-transparent border-none outline-none w-full text-zinc-200 mono placeholder:text-zinc-600">
                <kbd class="hidden md:block bg-zinc-800 text-zinc-500 px-2 py-1 rounded border border-zinc-700 text-xs mono">⌘K</kbd>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6" id="tools">
            <template x-for="tool in filteredTools" :key="tool.name">
                <div class="glass p-8 rounded-3xl text-left glow group cursor-pointer border border-zinc-800 hover:border-zinc-600 transition-all">
                    <div class="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center mb-6 group-hover:bg-white transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400 group-hover:text-black">
                            <path :d="tool.icon" />
                        </svg>
                    </div>
                    <h3 class="text-white font-semibold text-lg mb-2" x-text="tool.name"></h3>
                    <p class="text-zinc-500 text-sm leading-relaxed" x-text="tool.desc"></p>
                </div>
            </template>
        </div>

        <div x-show="filteredTools.length === 0" x-cloak class="mt-12 text-zinc-600 italic">
            No tools found for "<span x-text="search"></span>"
        </div>
    </main>

    <footer class="max-w-5xl mx-auto px-6 py-12 border-t border-zinc-800/50 flex justify-between items-center">
